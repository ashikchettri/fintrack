apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finance-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finance-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        # Flyway needs Postgres up; wait so a cold start doesn't crash-loop.
        - name: wait-for-postgres
          image: postgres:17-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432 -U fintrack; do echo 'waiting for postgres'; sleep 2; done"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
      containers:
        - name: finance-service
          image: fintrack/finance-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: fintrack-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: fintrack-secrets, key: POSTGRES_PASSWORD }
            # AI categorization is opt-in — empty key falls back to rules (ADR 009)
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: fintrack-secrets, key: ANTHROPIC_API_KEY }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits: { cpu: "1", memory: 640Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: tmp
          emptyDir: {}
