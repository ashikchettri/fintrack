# DEV-ONLY secret for local Minikube — the same throwaway password docker-compose
# uses. Real environments must NOT use this: create the Secret out-of-band (kubectl
# create secret / External Secrets / GKE Secret Manager) and keep it out of git.
#
# The JWT signing key is a SEPARATE secret ("auth-jwt") created from a PEM file —
# see infra/k8s/README.md — because a real private key never belongs in the repo.
apiVersion: v1
kind: Secret
metadata:
  name: fintrack-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: fintrack_local
