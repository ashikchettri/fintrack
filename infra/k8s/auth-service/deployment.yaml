apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001          # matches the Dockerfile's `app` user (ADR 015)
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        # Wait for Postgres so the app doesn't crash-loop on a cold start (Flyway
        # needs the DB up). Reuses the postgres image purely for pg_isready.
        - name: wait-for-postgres
          image: postgres:17-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432 -U fintrack; do echo 'waiting for postgres'; sleep 2; done"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
      containers:
        - name: auth-service
          image: fintrack/auth-service:latest
          # local image loaded into Minikube (`minikube image load …`); never pull.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: fintrack-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: fintrack-secrets, key: POSTGRES_PASSWORD }
            # PKCS#8 PEM mounted from the auth-jwt secret; required outside local (ADR 002)
            - name: FINTRACK_AUTH_JWT_PRIVATE_KEY
              value: file:/etc/fintrack/jwt-signing.pem
          volumeMounts:
            - name: jwt-key
              mountPath: /etc/fintrack
              readOnly: true
            - name: tmp
              mountPath: /tmp
          # Boot exposes these once management.endpoint.health.probes.enabled=true.
          startupProbe:              # allow slow first boot (Flyway migrations) without liveness killing it
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds: 5
            failureThreshold: 30     # up to ~150s to become ready
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits: { cpu: "1", memory: 640Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true     # the JVM only needs a writable /tmp (mounted below)
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: jwt-key
          secret:
            secretName: auth-jwt              # created from a PEM file — see README
        - name: tmp
          emptyDir: {}
