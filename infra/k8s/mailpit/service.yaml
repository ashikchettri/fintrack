apiVersion: v1
kind: Service
metadata:
  name: mailpit
spec:
  selector:
    app.kubernetes.io/name: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: http          # web inbox: `kubectl -n fintrack port-forward svc/mailpit 8025`
      port: 8025
      targetPort: 8025
