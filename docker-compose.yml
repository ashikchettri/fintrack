services:
  postgres:
    image: postgres:17-alpine
    container_name: fintrack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack_local}
      POSTGRES_DB: ${POSTGRES_DB:-fintrack}
    ports:
      # host port configurable: a native Postgres on 5432 (e.g. macOS installer)
      # would otherwise block compose — set POSTGRES_HOST_PORT=5433 in .env
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintrack}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backs the gateway rate limiter (ADR 007); later the refresh-token store too.
  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local mail sink (ADR 004): signup verification emails land here.
  # Web inbox: http://localhost:8025 · SMTP: localhost:1025 (auth-service default)
  mailpit:
    image: axllent/mailpit
    container_name: fintrack-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # Code quality — opt-in profile so `docker compose up -d postgres` stays lean.
  # Start:  docker compose --profile quality up -d sonarqube
  # UI:     http://localhost:9000 (first login admin/admin → change password,
  #         then create a project token and export SONAR_TOKEN for Gradle)
  sonarqube:
    image: sonarqube:community
    container_name: fintrack-sonarqube
    profiles: ["quality"]
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"   # dev-only: skip prod ES checks
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
  sonarqube_data:
  sonarqube_extensions:
