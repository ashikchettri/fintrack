name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build
        # Testcontainers uses the runner's built-in Docker daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: services/auth-service/build/reports/tests/
