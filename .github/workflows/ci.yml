name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, finance-service]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build
        # Testcontainers uses the runner's built-in Docker daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/tests/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b

      - name: Unit tests with coverage gate
        run: npm run test:coverage

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Playwright (mocked API)
        run: |
          npx playwright install chromium --with-deps
          npm run test:ui

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mocked
          path: frontend/playwright-report/

  frontend-e2e:
    # real browser → real auth-service → real Postgres
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start Postgres and Mailpit
        run: docker compose up -d postgres mailpit

      - name: Start auth-service
        working-directory: services/auth-service
        run: |
          ./gradlew bootRun --console=plain -q &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8081/actuator/health | grep -q UP && exit 0
            sleep 3
          done
          echo "auth-service failed to start" && exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Playwright e2e
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: frontend/playwright-report/
