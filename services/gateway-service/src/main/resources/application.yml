spring:
  application:
    name: gateway-service

  profiles:
    default: local   # deployments set SPRING_PROFILES_ACTIVE explicitly

  # Redis backs the request rate limiter (ADR 007). Same instance will later
  # hold the refresh-token store.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Downstream services + edge policy. Routes themselves live in GatewayConfig.
gateway:
  auth-uri: ${AUTH_URI:http://localhost:8081}
  finance-uri: ${FINANCE_URI:http://localhost:8082}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  rate-limit:
    replenish-rate: ${RATE_LIMIT_REPLENISH:20}   # tokens/sec steady state
    burst-capacity: ${RATE_LIMIT_BURST:40}       # max tokens in a spike

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
