spring:
  application:
    name: auth-service

  profiles:
    default: local   # bare bootRun/tests behave like local dev; deployments set SPRING_PROFILES_ACTIVE (ADR 002)

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:fintrack}?currentSchema=auth
    username: ${POSTGRES_USER:fintrack}
    password: ${POSTGRES_PASSWORD:fintrack_local}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never Hibernate
    open-in-view: false

  flyway:
    default-schema: auth
    locations: classpath:db/migration

  mvc:
    problemdetails:
      enabled: true    # framework errors (404, 405, bad JSON…) as RFC 9457 too

  # Defaults target the local Mailpit sink (docker compose). For Gmail set:
  # MAIL_HOST=smtp.gmail.com MAIL_PORT=587 MAIL_SMTP_AUTH=true MAIL_SMTP_STARTTLS=true
  # MAIL_USERNAME=<gmail address> MAIL_PASSWORD=<App Password — never the account password>
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: 8081

fintrack:
  auth:
    jwt:
      issuer: fintrack-auth
      access-token-ttl: 15m
      refresh-token-ttl: 7d
      # private-key: file:/etc/fintrack/jwt-signing.pem   # PKCS#8 PEM — required outside local (ADR 002)
    refresh-cookie:
      secure: true   # HTTPS-only; application-local.yml turns this off for plain-http dev (ADR 003)
    # smtp | resend | mailpit | auto (auto = SMTP creds > Resend key > Mailpit)
    mail-provider: ${MAIL_PROVIDER:auto}
    resend:
      # Resend transactional email (provider chain in EmailSenderConfig).
      # Until a domain is verified in Resend, the test sender below delivers
      # only to the Resend account owner's address.
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:FinTrack <onboarding@resend.dev>}
    verification:
      code-length: 4     # ADR 004 — compensated by ttl + attempt cap; bump to 6 when stakes rise
      code-ttl: 15m
      max-attempts: 5
      resend-cooldown: 60s
      from-address: ${MAIL_FROM:no-reply@fintrack.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true      # /actuator/health/{liveness,readiness} for K8s later
