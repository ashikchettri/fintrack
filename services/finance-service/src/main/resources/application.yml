spring:
  application:
    name: finance-service

  profiles:
    default: local   # deployments set SPRING_PROFILES_ACTIVE explicitly

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:fintrack}?currentSchema=finance
    username: ${POSTGRES_USER:fintrack}
    password: ${POSTGRES_PASSWORD:fintrack_local}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never Hibernate
    open-in-view: false

  flyway:
    default-schema: finance
    locations: classpath:db/migration

  mvc:
    problemdetails:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # auth-service's public keys — fetched lazily, cached by Nimbus
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8081/.well-known/jwks.json}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
